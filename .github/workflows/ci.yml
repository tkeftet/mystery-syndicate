name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: Type-check (mobile + backend + shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - name: Install
        run: yarn install --frozen-lockfile
      - name: Type-check all workspaces
        run: yarn type-check

  smoke:
    name: Backend smoke test
    runs-on: ubuntu-latest
    needs: type-check
    env:
      # Set this repository secret to enable the smoke test against a throwaway
      # DB (the script uses dbName "detective-club-smoketest" and drops it after).
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - name: Install
        run: yarn install --frozen-lockfile
      - name: Run smoke test (skips if MONGODB_URI secret is not set)
        run: |
          if [ -z "$MONGODB_URI" ]; then
            echo "MONGODB_URI secret not set — skipping smoke test."
            exit 0
          fi
          yarn --cwd backend ts-node-dev --transpile-only src/scripts/smoke.ts
