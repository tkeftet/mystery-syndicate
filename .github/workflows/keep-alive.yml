name: Keep backend alive

# Pings the backend /health endpoint on a schedule so free-tier hosts
# (Render, Railway, etc.) don't spin the service down for inactivity.
on:
  schedule:
    # Every 10 minutes. Note: GitHub's scheduler is best-effort and can be
    # delayed several minutes under load — fine for keep-alive, not exact.
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "BACKEND_URL secret not set — nothing to ping."
            exit 1
          fi
          # Normalize the secret so the final URL is always <origin>/health,
          # no matter how it was entered (trailing spaces, CR, slashes, or a
          # trailing "/health" the user already appended).
          url="$(printf '%s' "$BACKEND_URL" | tr -d '\r\n' | sed 's/[[:space:]]*$//; s/^[[:space:]]*//')"
          while [ "${url%/}" != "$url" ]; do url="${url%/}"; done   # strip trailing slashes
          url="${url%/health}"                                       # drop a trailing /health if present
          while [ "${url%/}" != "$url" ]; do url="${url%/}"; done   # and any slash it exposed
          echo "Pinging $url/health"
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 --retry 3 --retry-delay 10 "$url/health")
          echo "HTTP $code"
          [ "$code" = "200" ]
